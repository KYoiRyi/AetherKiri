name: Linux Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Linux App
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build pkg-config \
            autoconf automake libtool \
            gettext bison flex \
            curl unzip zip ccache \
            libgtk-3-dev libblkid-dev \
            libglib2.0-dev liblzma-dev \
            clang libstdc++-12-dev

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-linux-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Enable Flutter Linux Desktop
        run: |
          flutter config --no-analytics
          flutter config --enable-linux-desktop

      - name: Restore vcpkg cache
        id: restore-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-linux-vcpkg

      - name: Build Linux Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh linux release --jobs=4

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-Linux-x64
          path: apps/flutter_app/build/linux/x64/release/bundle/
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-linux-vcpkg

      - name: Save ccache
        if: success() && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-linux-ccache
