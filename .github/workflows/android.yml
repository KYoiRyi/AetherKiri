name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  VCPKG_CACHE_TAG: android-vcpkg-cache
  VCPKG_CACHE_ASSET: android-vcpkg-cache.tar.zst
  VCPKG_LEGACY_CACHE_RESTORE_KEY: Linux-android-vcpkg-

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    outputs:
      vcpkg-cache-ready: ${{ steps.detect-vcpkg-cache.outputs.changed }}
      build-succeeded: ${{ steps.build-android.outcome == 'success' && 'true' || 'false' }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip zstd ccache jq

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore shared vcpkg cache from release asset
        id: restore-release-vcpkg
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.cache/vcpkg"
          if gh release download "${VCPKG_CACHE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${VCPKG_CACHE_ASSET}" \
            --dir "${RUNNER_TEMP}/vcpkg-release-cache"; then
            mkdir -p "${RUNNER_TEMP}/vcpkg-release-cache/extracted"
            tar --zstd -xf "${RUNNER_TEMP}/vcpkg-release-cache/${VCPKG_CACHE_ASSET}" \
              -C "${RUNNER_TEMP}/vcpkg-release-cache/extracted"
            cp -a "${RUNNER_TEMP}/vcpkg-release-cache/extracted/workspace/." "${GITHUB_WORKSPACE}/" || true
            cp -a "${RUNNER_TEMP}/vcpkg-release-cache/extracted/home-cache/." "$HOME/.cache/" || true
            echo "hit=true" >> "$GITHUB_OUTPUT"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore legacy vcpkg cache fallback
        if: steps.restore-release-vcpkg.outputs.hit != 'true'
        id: restore-legacy-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg-legacy-bootstrap
          restore-keys: |
            ${{ env.VCPKG_LEGACY_CACHE_RESTORE_KEY }}

      - name: Mark vcpkg cache baseline
        run: |
          mkdir -p "$HOME/.cache/vcpkg/archives"
          touch "${RUNNER_TEMP}/vcpkg-cache-before-build.marker"

      - name: Build Android Release
        id: build-android
        continue-on-error: true
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache

          for attempt in 1 2 3; do
            if ./build.sh android release --jobs=4; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "Android build failed on attempt ${attempt}, retrying..."
            sleep $((attempt * 20))
          done

      - name: Detect vcpkg cache updates
        id: detect-vcpkg-cache
        if: always()
        run: |
          set -euo pipefail
          changed_file="$(
            find .devtools/vcpkg "$HOME/.cache/vcpkg/archives" \
              -type f \
              -newer "${RUNNER_TEMP}/vcpkg-cache-before-build.marker" \
              -print -quit
          )"
          if [ -n "$changed_file" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack shared vcpkg cache
        if: always() && steps.detect-vcpkg-cache.outputs.changed == 'true'
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/vcpkg-cache-payload"
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache-payload/workspace/.devtools"
          mkdir -p "${RUNNER_TEMP}/vcpkg-cache-payload/home-cache/vcpkg"
          if [ -d "${GITHUB_WORKSPACE}/.devtools/vcpkg" ]; then
            cp -a "${GITHUB_WORKSPACE}/.devtools/vcpkg" "${RUNNER_TEMP}/vcpkg-cache-payload/workspace/.devtools/"
          fi
          if [ -d "$HOME/.cache/vcpkg/archives" ]; then
            cp -a "$HOME/.cache/vcpkg/archives" "${RUNNER_TEMP}/vcpkg-cache-payload/home-cache/vcpkg/"
          fi
          tar --zstd -cf "${RUNNER_TEMP}/${VCPKG_CACHE_ASSET}" \
            -C "${RUNNER_TEMP}/vcpkg-cache-payload" \
            workspace home-cache

      - name: Upload vcpkg cache payload artifact
        if: always() && steps.detect-vcpkg-cache.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-vcpkg-cache-payload
          path: ${{ runner.temp }}/${{ env.VCPKG_CACHE_ASSET }}
          retention-days: 1

      - name: Upload Artifact
        if: steps.build-android.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-Android-APK
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Save ccache
        if: steps.build-android.outcome == 'success' && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache

      - name: Fail build if Android build failed
        if: steps.build-android.outcome != 'success'
        run: exit 1

  publish-vcpkg-cache:
    name: Publish shared Android vcpkg cache
    runs-on: ubuntu-latest
    needs: build
    if: always() && needs.build.outputs.vcpkg-cache-ready == 'true'
    permissions:
      contents: write
    concurrency:
      group: ${{ github.repository }}-android-vcpkg-cache
      cancel-in-progress: false

    steps:
      - name: Download vcpkg cache payload artifact
        uses: actions/download-artifact@v4
        with:
          name: android-vcpkg-cache-payload
          path: ${{ runner.temp }}/android-vcpkg-cache

      - name: Ensure cache release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "${VCPKG_CACHE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${VCPKG_CACHE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${VCPKG_CACHE_TAG}" \
            --notes "Shared Android vcpkg cache" \
            --prerelease

      - name: Publish single shared vcpkg cache asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${VCPKG_CACHE_TAG}" \
            "${RUNNER_TEMP}/android-vcpkg-cache/${VCPKG_CACHE_ASSET}#${VCPKG_CACHE_ASSET}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
