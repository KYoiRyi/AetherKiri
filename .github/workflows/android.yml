name: Android Build

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      VCPKG_CACHE_PREFIX: ${{ runner.os }}-android-vcpkg
      VCPKG_CACHE_SHARED_PREFIX: ${{ runner.os }}-android-vcpkg-shared-
      VCPKG_CACHE_SAVE_KEY: ${{ runner.os }}-android-vcpkg-shared-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip ccache jq

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore vcpkg cache
        id: restore-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-android-vcpkg-shared
          restore-keys: |
            ${{ env.VCPKG_CACHE_SHARED_PREFIX }}
            ${{ env.VCPKG_CACHE_PREFIX }}-

      - name: Build Android Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          ./build.sh android release --jobs=4

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-Android-APK
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Save vcpkg cache
        id: save-vcpkg
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ env.VCPKG_CACHE_SAVE_KEY }}

      - name: Cleanup old vcpkg caches
        if: success() && steps.save-vcpkg.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_KEY: ${{ env.VCPKG_CACHE_SAVE_KEY }}
          SHARED_PREFIX: ${{ env.VCPKG_CACHE_SHARED_PREFIX }}
          LEGACY_PREFIX: ${{ env.VCPKG_CACHE_PREFIX }}-
        run: |
          set -euo pipefail

          cleanup_prefix() {
            local prefix="$1"
            local page_json
            page_json="$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/caches?per_page=100&key=${prefix}")"

            echo "$page_json" | jq -r '.actions_caches[] | @base64' | while read -r entry; do
              [ -n "$entry" ] || continue
              local decoded
              decoded="$(printf '%s' "$entry" | base64 -d)"
              local cache_id cache_key
              cache_id="$(printf '%s' "$decoded" | jq -r '.id')"
              cache_key="$(printf '%s' "$decoded" | jq -r '.key')"

              if [ "$cache_key" = "$CURRENT_KEY" ]; then
                continue
              fi

              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${GITHUB_REPOSITORY}/actions/caches/${cache_id}" || true
            done
          }

          cleanup_prefix "$SHARED_PREFIX"
          cleanup_prefix "$LEGACY_PREFIX"

      - name: Save ccache
        if: success() && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-android-ccache
