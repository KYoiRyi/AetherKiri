name: Android Build

on:
  push:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config autoconf automake libtool gettext bison flex curl unzip zip

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-android-ccache
          max-size: 1000M

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore vcpkg downloads and archives
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
            apps/flutter_app/build/.cxx
          key: ${{ runner.os }}-vcpkg-android-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-android-${{ hashFiles('vcpkg.json') }}-
            ${{ runner.os }}-vcpkg-android-
            ${{ runner.os }}-vcpkg-

      - name: Build Android Release
        run: |
          chmod +x ./build.sh
          # Pass compiler launchers to speed up rebuilds using ccache
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          export NDK_CCACHE=ccache
          # The script internally runs build_android.sh which defaults to release configuration
          ./build.sh android release --jobs=4

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KrKr2-Next-Android-APK
          path: apps/flutter_app/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Save vcpkg cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-android-${{ hashFiles('vcpkg.json') }}-${{ github.run_id }}
