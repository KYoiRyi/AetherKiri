name: macOS Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          brew install cmake ninja pkg-config autoconf automake autoconf-archive libtool gettext coreutils bison ccache jq
          echo "$(brew --prefix gettext)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-macos-ccache-

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
             ${{ runner.os }}-macos-vcpkg-

      - name: Build macOS Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh macos release --jobs=4

      - name: Find built .app
        id: find_app
        run: |
          APP_PATH=$(find apps/flutter_app/build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Built .app bundle not found"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-macOS
          path: ${{ steps.find_app.outputs.app_path }}
          retention-days: 7

      - name: Save vcpkg cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Save ccache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache-${{ github.run_id }}

      - name: Clean up older caches
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching list of caches..."
          gh api -H "Accept: application/vnd.github+json" /repos/$GITHUB_REPOSITORY/actions/caches > caches.json || exit 0
          
          CURRENT_VCPKG_KEY="${{ runner.os }}-macos-vcpkg-${{ hashFiles('vcpkg.json') }}"
          jq -r ".actions_caches[] | select(.key | startswith(\"${{ runner.os }}-macos-vcpkg-\")) | select(.key != \"$CURRENT_VCPKG_KEY\") | .id" caches.json | while read id; do
            echo "Deleting old vcpkg cache ID: $id"
            gh api --method DELETE -H "Accept: application/vnd.github+json" /repos/$GITHUB_REPOSITORY/actions/caches/$id || true
          done
          
          CURRENT_CCACHE_KEY="${{ runner.os }}-macos-ccache-${{ github.run_id }}"
          jq -r ".actions_caches[] | select(.key | startswith(\"${{ runner.os }}-macos-ccache-\")) | select(.key != \"$CURRENT_CCACHE_KEY\") | .id" caches.json | while read id; do
            echo "Deleting old ccache ID: $id"
            gh api --method DELETE -H "Accept: application/vnd.github+json" /repos/$GITHUB_REPOSITORY/actions/caches/$id || true
          done
