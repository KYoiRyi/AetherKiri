name: macOS Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build macOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
      CCACHE_DIR: ${{ github.workspace }}/.ccache

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          brew install cmake ninja pkg-config autoconf automake autoconf-archive gettext coreutils bison ccache
          echo "$(brew --prefix gettext)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Restore ccache
        id: restore-ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache

      - name: Setup ccache config
        run: |
          ccache --max-size=1000M
          ccache -z

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore vcpkg cache
        id: restore-vcpkg
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg

      - name: Build macOS Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh macos release --jobs=4

      - name: Find built .app
        id: find_app
        run: |
          APP_PATH=$(find apps/flutter_app/build/macos -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Built .app bundle not found"
            exit 1
          fi
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-macOS
          path: ${{ steps.find_app.outputs.app_path }}
          retention-days: 7

      - name: Save vcpkg cache
        if: success() && steps.restore-vcpkg.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-macos-vcpkg

      - name: Save ccache
        if: success() && steps.restore-ccache.outputs.cache-matched-key == ''
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: ${{ runner.os }}-macos-ccache
