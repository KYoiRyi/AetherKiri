name: iOS Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Build Systems
        run: |
          brew install cmake ninja pkg-config autoconf automake autoconf-archive libtool gettext coreutils bison
          echo "$(brew --prefix gettext)/bin" >> $GITHUB_PATH
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache
          max-size: 1000M

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Disable Analytics
        run: |
          flutter config --no-analytics

      - name: Restore vcpkg cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Build iOS Release
        run: |
          chmod +x ./build.sh
          export CMAKE_C_COMPILER_LAUNCHER=ccache
          export CMAKE_CXX_COMPILER_LAUNCHER=ccache
          ./build.sh ios release --jobs=4

      - name: Compress App Bundle
        run: |
          cd apps/flutter_app/build/ios/iphoneos || exit 0
          if [ -d "Runner.app" ]; then
            mkdir -p Payload
            mv Runner.app Payload/
            zip -r AetherKiri-iOS.ipa Payload
          else
            echo "Runner.app not found in expected directory"
          fi

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: AetherKiri-iOS-Unsigned
          path: apps/flutter_app/build/ios/iphoneos/AetherKiri-iOS.ipa
          retention-days: 7

      - name: Save vcpkg cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: |
            .devtools/vcpkg
            ~/.cache/vcpkg/archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}
